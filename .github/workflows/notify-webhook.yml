name: Release_Notification
on:
  release:
    # 정식 발행, 수정, 프리릴리즈 시 모두 작동하도록 설정
    types: [published, edited, prereleased]

env:
  # Node.js 24 환경 강제 적용 (경고 방지 및 스트레스 테스트)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord 알림 전송
        uses: sarisia/actions-status-discord@v1
        with:
          # 'webhook_url'을 'webhook'으로 수정 완료
          webhook: ${{ secrets.RELEASE_NOTIFICATION }}
          status: success
          title: "🎉 Filelo 새로운 버전 출시!"
          description: |
            📦 **버전:** ${{ github.event.release.tag_name }}
            📝 **업데이트 내용:** ${{ github.event.release.body }}
            
            🔗 **상세정보:** [GitHub Release 바로가기](${{ github.event.release.html_url }})
          color: 0x00ff00
