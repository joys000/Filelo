name: Release_Notification
on:
  release:
    # prereleased를 추가해야 테스트용 프리릴리즈에서도 작동합니다.
    types: [published, edited, prereleased]

env:
  # Node.js 24 강제 전환 대비 (경고 제거)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord 알림 전송
        uses: sarisia/actions-status-discord@v1
        with:
          # webhook_url을 webhook으로 수정 완료
          webhook: ${{ secrets.RELEASE_NOTIFICATION }}
          status: success
          title: "🎉 Filelo 새로운 버전 출시!"
          description: |
            📦 **버전:** ${{ github.event.release.tag_name }}
            📝 **업데이트 내용:** ${{ github.event.release.body }}
            
            🔗 **상세정보:** [GitHub Release 바로가기](${{ github.event.release.html_url }})
          color: 0x00ff00
