name: Release_Notification
on:
  release:
    # prereleased(프리릴리즈)를 추가하여 테스트 시에도 알림이 오도록 합니다.
    types: [published, edited, prereleased]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord 알림 전송
        uses: sarisia/actions-status-discord@v1
        with:
          webhook_url: ${{ secrets.RELEASE_NOTIFICATION }}
          status: success
          title: "🎉 Filelo 새로운 버전 출시!"
          description: |
            📦 **버전:** ${{ github.event.release.tag_name }}
            📝 **업데이트 내용:** ${{ github.event.release.body }}
            
            🔗 **상세정보:** [GitHub Release 바로가기](${{ github.event.release.html_url }})
          color: 0x00ff00
