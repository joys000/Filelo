name: Release_Notification
on:
  release:
      types: [published, edited]

      jobs:
        notify:
            runs-on: ubuntu-latest
                steps:
                      - name: Send Discord Message
                              env:
                                        WEBHOOK_URL: ${{ secrets.Release_Notification }}
                                                run: |
                                                          curl -X POST "$WEBHOOK_URL" \
                                                                    -H "Content-Type: application/json" \
                                                                              -d '{"content":"🎉 **Filelo 새로운 버전 출시!**\n\n📦 **버전**: ${{ github.event.release.tag_name }}\n\n📝 **업데이트**: ${{ github.event.release.body }}\n\n🔗 **링크**: ${{ github.event.release.html_url }}"}'
