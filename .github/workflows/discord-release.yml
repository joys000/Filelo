name: Release Notification
on:
  release:
      types: [published]
      jobs:
        notify:
            runs-on: ubuntu-latest
                steps:
                      - run: curl -X POST ${{ secrets.Release_Notification }} -H "Content-Type: application/json" --data '{"content":"Filelo 새로운 버전 출시!\n버전: ${{ github.event.release.tag_name }}"}'
