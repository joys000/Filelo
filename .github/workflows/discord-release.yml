name: Release_Notification

on:
  release:
      types: [published]

      jobs:
        notify-discord:
            runs-on: ubuntu-latest
                steps:
                      - name: Discord Notification
                              run: |
                                        curl -X POST ${{ secrets.Release_Notification }} \
                                                  -H "Content-Type: application/json" \
                                                            -d "{
                                                                        \"content\": \"🎉 **Filelo 새로운 버전 출시!**\n\n📦 **버전**: ${{ github.event.release.tag_name }}\n\n📝 **업데이트 내용**:\n\`\`\`\n${{ github.event.release.body }}\n\`\`\`\n\n🔗 **상세정보**: ${{ github.event.release.html_url }}\"
                                                                                  }"
